<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dil Gelişimi Testi</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="welcomeScreen" class="welcome-screen">
      <div class="welcome-card">
        <p class="eyebrow">Hos Geldin</p>
        <h1 class="welcome-title">Furkan Yörümez'in Hayratıdır</h1>
        <p class="welcome-text">Teste hazirsan basla butonuna tikla ve sorulari coz.</p>
        <button id="startBtn" class="primary-btn welcome-btn" type="button">Basla</button>
      </div>
    </section>

    <main class="app-shell">
      <aside class="navigator-card">
        <div class="navigator-head">
          <p class="eyebrow">Hızlı Geçiş</p>
          <h2>Sorular</h2>
        </div>
        <div id="questionNav" class="question-nav"></div>
      </aside>

      <section class="card">
        <div class="topbar">
          <div>
            <p class="eyebrow">Sunumdan Üretilen Test</p>
            <h1>Dil ve Kavram Gelişimi</h1>
          </div>
          <button id="restartBtn" class="ghost-btn" type="button">Baştan Başla</button>
        </div>

        <div class="level-tabs" id="levelTabs">
          <button class="tab-btn active" data-level="easy" type="button">Kolay</button>
          <button class="tab-btn" data-level="medium" type="button">Orta</button>
          <button class="tab-btn" data-level="hard" type="button">Zor</button>
        </div>

        <div class="status-row">
          <div class="status-box">
            <span>Soru</span>
            <strong id="questionCounter">1 / 50</strong>
          </div>
          <div class="status-box">
            <span>Doğru</span>
            <strong id="scoreCounter">0</strong>
          </div>
          <div class="status-box">
            <span>Bölüm</span>
            <strong id="levelLabel">Kolay</strong>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <section id="quizScreen">
          <h2 id="questionText" class="question-text"></h2>
          <div id="answers" class="answers"></div>
          <p id="feedback" class="feedback"></p>
        </section>

        <section id="resultScreen" class="result-screen hidden">
          <p class="eyebrow">Test Tamamlandı</p>
          <h2 id="resultTitle">Skorun Hazır</h2>
          <p id="resultText" class="result-text"></p>
          <button id="restartBtnBottom" class="primary-btn" type="button">Tekrar Çöz</button>
        </section>
      </section>
    </main>

    <script src="./questions.js?v=20260327e"></script>
    <script src="./app.js?v=20260327e"></script>
  </body>
</html>
